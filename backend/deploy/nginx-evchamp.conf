# nginx reverse proxy for the EvChamp backend on EC2.
#
# Put this at /etc/nginx/sites-available/evchamp, then:
#   sudo ln -s /etc/nginx/sites-available/evchamp /etc/nginx/sites-enabled/evchamp
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.evchamp.app        # adds the TLS/443 block automatically
#
# certbot rewrites this to listen on 443 with the cert and redirect 80->443.
# The Upgrade/Connection headers make WebSocket proxying work (needed if you ever
# proxy OCPP through nginx; the customer/admin API itself is plain HTTP requests).

server {
    listen 80;
    server_name api.evchamp.app;          # <-- replace with your real domain

    # API + everything the frontends call
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;          # long-poll / SSE friendly
    }
}

# ── OCPP over TLS (wss://) — ONLY needed when real chargers connect ─────────────
# Chargers dial ws(s)://<host>:9220/{chargeboxId}. Two options:
#   (a) expose port 9220 directly on the EC2 security group (plain ws:// — dev only), or
#   (b) terminate TLS here with an nginx `stream {}` block (put in /etc/nginx/nginx.conf,
#       NOT this http server block) forwarding 9220 -> 127.0.0.1:9220 with your cert.
# Not required for the web apps to work — skip until you onboard hardware.
